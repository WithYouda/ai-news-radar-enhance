<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI News Radar｜24 小时 AI 更新雷达</title>
    <meta
      name="description"
      content="自动整理过去 24 小时值得看的 AI、模型和开发者工具更新；伯乐Skill（Scout Skill）帮你从一堆信源里选出千里马。"
    />
    <link rel="canonical" href="https://withyouda.github.io/ai-news-radar-enhance/" />
    <meta property="og:title" content="AI News Radar｜24 小时 AI 更新雷达" />
    <meta
      property="og:description"
      content="自动整理过去 24 小时值得看的 AI、模型和开发者工具更新；伯乐Skill（Scout Skill）帮你从一堆信源里选出千里马。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://withyouda.github.io/ai-news-radar-enhance/" />
    <meta property="og:site_name" content="AI News Radar" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AI News Radar｜24 小时 AI 更新雷达" />
    <meta
      name="twitter:description"
      content="自动整理过去 24 小时值得看的 AI、模型和开发者工具更新；伯乐Skill（Scout Skill）帮你从一堆信源里选出千里马。"
    />
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./assets/styles.css?v=api-domain-0602" />
  </head>
  <body>
    <main class="shell">
      <header class="hero" data-mobile-view="today">
        <div class="hero-main">
          <div class="hero-headline">
            <img class="hero-logo" src="./assets/logo.svg" alt="AI News Radar Logo" />
            <div>
              <p class="hero-tag">AI NEWS RADAR</p>
              <h1>24 小时 AI 更新雷达</h1>
            </div>
          </div>
          <p class="hero-sub">
            过去 24 小时值得看的 AI/科技更新；伯乐精选按时间轴和评分挑出重点信号。
          </p>
        </div>
        <div class="hero-meta">
          <span class="updated-label">更新时间</span>
          <span class="updated" id="updatedAt">加载中...</span>
        </div>

        <section class="stats" id="stats"></section>

        <section class="coverage-strip" id="coverageStrip" aria-label="Source coverage status"></section>
      </header>

      <section class="primary-controls" data-mobile-view="today">
        <input id="searchInput" type="search" placeholder="搜索 AI 信号 / 来源" />
        <div class="mode-hint" id="modeHint">AI强相关</div>
      </section>

      <details class="advanced-panel" data-mobile-view="today">
        <summary>
          <span>高级筛选与源状态</span>
          <span class="advanced-summary" id="advancedSummary">加载中...</span>
        </summary>
        <div class="advanced-content">
          <div class="advanced-controls">
            <label class="field">
              <span>站点</span>
              <select id="siteSelect">
                <option value="">全部站点</option>
              </select>
            </label>
            <div class="field">
              <span>视图</span>
              <div class="mode-switch">
                <button id="modeAiBtn" class="mode-btn active" type="button">AI强相关</button>
                <button id="modeAllBtn" class="mode-btn" type="button">全量</button>
              </div>
            </div>
            <label id="allDedupeWrap" class="all-dedupe" for="allDedupeToggle">
              <input id="allDedupeToggle" type="checkbox" checked />
              <span class="all-dedupe-dot"></span>
              <span id="allDedupeLabel">去重开</span>
            </label>
          </div>
          <div class="source-health" id="sourceHealth">源状态加载中...</div>
          <section class="site-pills" id="sitePills"></section>
        </div>
      </details>

      <section class="bole-picks-wrap" aria-label="伯乐精选" data-mobile-view="today">
        <div class="bole-picks-head">
          <div>
            <p class="section-eyebrow">BOLE PICKS</p>
            <h2>伯乐精选</h2>
          </div>
          <span id="bolePicksMeta">按评分排序</span>
        </div>
        <div class="bole-picks-sub">从 24 小时信号池里挑出更值得先看的更新，展示发布时间线、评分和命中理由。</div>
        <div id="bolePicksList" class="bole-board"></div>
      </section>

      <section class="waytoagi-wrap" data-mobile-view="today">
        <div class="waytoagi-head">
          <h2>WaytoAGI 更新日志</h2>
          <div class="waytoagi-tools">
            <div class="waytoagi-switch">
              <button id="waytoagiTodayBtn" class="waytoagi-btn active" type="button">最近更新日</button>
              <button id="waytoagi7dBtn" class="waytoagi-btn" type="button">近7日</button>
            </div>
            <span id="waytoagiUpdatedAt">加载中...</span>
          </div>
        </div>
        <div id="waytoagiMeta" class="waytoagi-meta"></div>
        <div id="waytoagiList" class="waytoagi-list"></div>
      </section>

      <section class="list-wrap" data-mobile-view="today">
        <div class="list-head">
          <h2 id="listTitle">AI 信号流</h2>
          <span id="resultCount">0 条</span>
        </div>
        <div id="newsList" class="news-list"></div>
      </section>

      <section id="categoryView" class="mobile-view-panel" data-mobile-view="categories" hidden>
        <div class="mobile-section-head">
          <h2>分类</h2>
          <span id="categoryMeta">加载中...</span>
        </div>
        <div id="categoryGrid" class="category-grid"></div>
        <div id="categoryDetail" class="category-detail"></div>
      </section>

      <section id="verificationView" class="mobile-view-panel" data-mobile-view="verification" hidden>
        <div class="mobile-section-head">
          <h2>核验</h2>
          <span id="verificationMeta">未连接后端</span>
        </div>
        <div id="verificationSummary" class="verification-summary"></div>
        <div id="verificationList" class="verification-list"></div>
      </section>

      <section id="settingsView" class="mobile-view-panel" data-mobile-view="settings" hidden>
        <div class="mobile-section-head">
          <h2>设置</h2>
          <span id="settingsStatus">未登录</span>
        </div>
        <div class="settings-panel">
          <input id="adminPasswordInput" type="password" placeholder="管理员密码" />
          <button id="loginButton" type="button">登录</button>
          <label class="settings-toggle">
            <input id="deepVerificationToggle" type="checkbox" />
            <span>默认深度核验伯乐精选与分类 Top N</span>
          </label>
          <label class="field">
            <span>Top N</span>
            <input id="deepVerificationTopN" type="number" min="1" max="10" value="3" />
          </label>
          <button id="saveSettingsButton" type="button">保存设置</button>
        </div>
      </section>

    </main>

    <section id="askAiSheet" class="ask-ai-sheet" hidden aria-label="问 AI">
      <div class="ask-ai-panel">
        <div class="ask-ai-head">
          <h2>问 AI</h2>
          <button id="askAiClose" type="button">关闭</button>
        </div>
        <div id="askAiContext" class="ask-ai-context">今日</div>
        <textarea id="askAiInput" rows="3" placeholder="问今天的信息流..."></textarea>
        <button id="askAiSubmit" type="button">发送</button>
        <div id="askAiAnswer" class="ask-ai-answer"></div>
      </div>
    </section>

    <nav id="mobileBottomNav" class="mobile-bottom-nav" aria-label="移动端主导航">
      <button type="button" class="mobile-nav-btn active" data-view="today">今日</button>
      <button type="button" class="mobile-nav-btn" data-view="categories">分类</button>
      <button type="button" class="mobile-nav-btn" data-view="verification">核验</button>
      <button type="button" class="mobile-nav-btn" data-view="settings">设置</button>
    </nav>
    <button id="askAiButton" class="ask-ai-fab" type="button">问 AI</button>

    <template id="itemTpl">
      <article class="news-card">
        <div class="meta-row">
          <span class="site"></span>
          <span class="category"></span>
          <span class="source"></span>
          <time class="time"></time>
        </div>
        <a class="title" target="_blank" rel="noopener noreferrer"></a>
      </article>
    </template>

    <script src="./assets/config.js?v=api-domain-0602"></script>
    <script src="./assets/app.js?v=api-domain-0602" defer></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
